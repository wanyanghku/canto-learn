<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#5b8def">
<title>粤语卡片 · 杨万</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🗣️</text></svg>">
<style>
  :root{
    --bg:#f4f6fb; --card:#ffffff; --ink:#1c2430; --sub:#67727f;
    --accent:#5b8def; --accent2:#7c5cff; --good:#2bb673; --warm:#ff8a5b;
    --line:#e6eaf2; --shadow:0 6px 22px rgba(40,60,110,.10);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","PingFang HK","Noto Sans CJK SC","Microsoft YaHei",sans-serif;
    background:var(--bg); color:var(--ink); line-height:1.6;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  .wrap{max-width:560px; margin:0 auto; padding:16px 16px 40px}
  header.top{display:flex; align-items:center; gap:10px; padding:8px 2px 14px}
  header.top h1{font-size:20px; margin:0; font-weight:800; letter-spacing:.5px}
  header.top .spark{font-size:22px}
  .muted{color:var(--sub); font-size:13px}

  .hero{background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#fff; border-radius:18px; padding:18px 18px 16px; box-shadow:var(--shadow); margin-bottom:16px}
  .hero h2{margin:0 0 4px; font-size:18px}
  .hero p{margin:0; opacity:.92; font-size:13px}
  .hero .stat{margin-top:12px; display:flex; gap:14px; font-size:13px}
  .hero .stat b{font-size:18px; display:block}

  .deck{display:flex; align-items:center; gap:14px; background:var(--card); border:1px solid var(--line);
    border-radius:16px; padding:14px 16px; margin-bottom:11px; cursor:pointer; box-shadow:var(--shadow); transition:transform .08s ease}
  .deck:active{transform:scale(.985)}
  .deck.star{background:linear-gradient(135deg,#fff7ed,#ffeede); border-color:#ffd9b3}
  .deck .num{font-size:15px; font-weight:800; color:var(--accent); min-width:30px; text-align:center}
  .deck.star .num{color:var(--warm); font-size:18px}
  .deck .body{flex:1; min-width:0}
  .deck .body .nm{font-weight:700; font-size:16px}
  .deck .body .ds{font-size:12.5px; color:var(--sub); margin-top:1px}
  .deck .prog{min-width:60px; text-align:right; font-size:12px; color:var(--sub)}
  .bar{height:6px; border-radius:99px; background:var(--line); margin-top:6px; overflow:hidden}
  .bar > i{display:block; height:100%; background:linear-gradient(90deg,var(--good),#5fd0a0); width:0%}

  .tip{font-size:12.5px; color:var(--sub); background:#eef2fb; border:1px dashed #cdd8ef; border-radius:12px; padding:10px 12px; margin:6px 0 16px}

  .study{display:none}
  .study.on{display:block}
  .sbar{display:flex; align-items:center; gap:10px; margin-bottom:14px}
  .btn{background:var(--card); color:var(--ink); border:1px solid var(--line); border-radius:12px; padding:9px 13px; font-size:14px; font-weight:600; cursor:pointer}
  .btn:active{transform:scale(.96)}
  .sbar .title{flex:1; font-weight:700; font-size:15px; text-align:center}
  .sbar .count{font-size:13px; color:var(--sub); min-width:46px; text-align:right}

  .flash{background:var(--card); border:1px solid var(--line); border-radius:22px; box-shadow:var(--shadow);
    min-height:300px; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:26px 20px; text-align:center}
  .flash .hk{font-size:52px; font-weight:800; line-height:1.25; letter-spacing:1px}
  .flash .hk.long{font-size:34px}
  .flash .hk.xlong{font-size:26px}
  .play{margin-top:20px; background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#fff; border:none;
    border-radius:99px; padding:13px 26px; font-size:16px; font-weight:700; cursor:pointer; box-shadow:0 4px 14px rgba(91,141,239,.4)}
  .play:active{transform:scale(.95)}
  .reveal{display:none; margin-top:18px; width:100%}
  .reveal.on{display:block; animation:fade .25s ease}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .jy{font-size:22px; color:var(--accent2); font-weight:700; letter-spacing:.5px}
  .cn{font-size:17px; color:var(--sub); margin-top:6px}

  .acts{display:flex; gap:12px; margin-top:16px}
  .acts button{flex:1; border-radius:14px; padding:15px 0; font-size:16px; font-weight:700; border:none; cursor:pointer}
  .again{background:#fff1ea; color:#e8693a; border:1px solid #ffd9c7!important}
  .know{background:#e6f8ef; color:#1d9c66; border:1px solid #bfedd5!important}
  .acts button:active{transform:scale(.97)}
  .showbtn{margin-top:18px; width:100%; border-radius:14px; padding:14px 0; font-size:16px; font-weight:700; background:var(--ink); color:#fff; border:none; cursor:pointer}
  .showbtn:active{transform:scale(.98)}

  .done{text-align:center; padding:40px 10px}
  .done .big{font-size:44px}
  .footer{margin-top:26px; text-align:center; font-size:12px; color:var(--sub)}
  .footer a{color:var(--accent)}
  .ghost{background:none;border:none;color:var(--sub);font-size:12.5px;cursor:pointer;text-decoration:underline;padding:4px}

  /* 调表网格 */
  .chartNote{font-size:13px;color:var(--sub);margin-bottom:10px}
  .rowbtns{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
  .rowbtns button{border:1px solid var(--line);background:var(--card);border-radius:10px;padding:8px 11px;font-size:13px;font-weight:600;cursor:pointer}
  .rowbtns button:active{transform:scale(.96)}
  .chartScroll{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:16px;border:1px solid var(--line);box-shadow:var(--shadow);background:var(--card)}
  .chartGrid{display:grid;grid-template-columns:repeat(9,minmax(50px,1fr));min-width:480px}
  .chartGrid .th{padding:8px 2px;text-align:center;font-size:11px;line-height:1.35;color:#3a4658;background:#eaf0fc;border-bottom:1px solid var(--line)}
  .chartGrid .th b{font-size:15px;display:block;color:var(--accent)}
  .chartGrid .th.ru b{color:var(--warm)}
  .chartGrid .rowlab{grid-column:1/-1;display:flex;align-items:center;gap:8px;padding:7px 10px;background:#f7f9fd;border-top:1px solid var(--line);border-bottom:1px solid var(--line);font-size:12.5px;font-weight:700;color:var(--sub)}
  .chartGrid .rowlab button{margin-left:auto;border:none;background:var(--accent);color:#fff;border-radius:8px;padding:5px 12px;font-size:13px;cursor:pointer}
  .chartGrid .cell{text-align:center;padding:11px 2px;cursor:pointer;border-bottom:1px solid #f0f3f9;border-right:1px solid #f0f3f9}
  .chartGrid .cell:active{background:#eef3ff}
  .chartGrid .cell .c{font-size:25px;font-weight:700}
  .chartGrid .cell .p{font-size:11px;color:var(--accent2);margin-top:1px}
  .scrollhint{font-size:11.5px;color:var(--sub);text-align:center;margin:8px 0 0}
</style>
</head>
<body>
<div class="wrap">

  <div id="home">
    <header class="top"><span class="spark">🗣️</span><h1>粤语卡片</h1><span class="muted" style="margin-left:auto">杨万 · 香港话</span></header>
    <div class="hero">
      <h2>慢慢嚟，識聽識講 🎧</h2>
      <p>跟住順序行：先聲調 → 入聲 → 茶餐廳 → 日常句。每張卡點 🔊 聽、跟讀。</p>
      <div class="stat">
        <div><b id="hLearned">0</b><span>已识得</span></div>
        <div><b id="hTotal">0</b><span>总卡片</span></div>
        <div><b id="hPct">0%</b><span>进度</span></div>
      </div>
    </div>
    <div class="tip">💡 用法：点卡片 <b>🔊 听</b> → 跟读出声 → <b>睇答案</b> 看粤拼+意思 → 选「识得 / 再练」。每天 10 分钟就够。第 ★ 张是第一课重点调表。</div>
    <div id="deckList"></div>
    <div class="footer">
      <button class="ghost" onclick="resetAll()">清空进度</button><br>
      笔记里听不懂的句子 → 丢给 Claude，我加进卡片。
    </div>
  </div>

  <div id="study" class="study">
    <div class="sbar">
      <button class="btn" onclick="goHome()">‹ 返回</button>
      <div class="title" id="sTitle"></div>
      <div class="count" id="sCount"></div>
    </div>
    <div id="cardArea"></div>
  </div>

</div>

<script src="cards.js"></script>
<script>
const LS='cantoLearn.v1';
let state={};
function load(){ try{state=JSON.parse(localStorage.getItem(LS))||{}}catch(e){state={}} }
function save(){ localStorage.setItem(LS,JSON.stringify(state)) }
function cardKey(di,ci){ return di+'/'+ci }
load();

function totalCards(){ return DECKS.reduce((s,d)=>s+((d.cards&&d.cards.length)||0),0) }
function learnedCount(di){ const d=DECKS[di]; if(!d.cards)return 0; let n=0; d.cards.forEach((_,ci)=>{if(state[cardKey(di,ci)]==='know')n++}); return n }
function allLearned(){ let n=0; DECKS.forEach((d,di)=>{n+=learnedCount(di)}); return n }

function renderHome(){
  const tot=totalCards(), lr=allLearned();
  hLearned.textContent=lr; hTotal.textContent=tot; hPct.textContent=(tot?Math.round(lr/tot*100):0)+'%';
  let html='';
  DECKS.forEach((d,di)=>{
    if(d.type==='chart'){
      html+=`<div class="deck star" onclick="startDeck(${di})">
        <div class="num">${d.num||'★'}</div>
        <div class="body"><div class="nm">${d.name}</div><div class="ds">${d.desc||''}</div></div>
        <div class="prog">🎧 点开</div></div>`;
      return;
    }
    const lc=learnedCount(di), tc=d.cards.length, pct=tc?Math.round(lc/tc*100):0;
    html+=`<div class="deck" onclick="startDeck(${di})">
      <div class="num">${d.num||(di+1)}</div>
      <div class="body"><div class="nm">${d.name}</div><div class="ds">${d.desc||''}</div>
        <div class="bar"><i style="width:${pct}%"></i></div></div>
      <div class="prog">${lc}/${tc}</div></div>`;
  });
  deckList.innerHTML=html;
}

// ---- 音频 ----
function audioFor(a){ return 'audio/'+encodeURIComponent(a)+'.mp3' }
let audioEl=null;
function playAudio(a){ try{ if(audioEl){audioEl.pause()} audioEl=new Audio(audioFor(a)); audioEl.play().catch(()=>{});}catch(e){} }

// ---- 调表网格 ----
function startDeck(di){
  const d=DECKS[di];
  document.getElementById('home').style.display='none';
  document.getElementById('study').classList.add('on');
  sTitle.textContent=d.name;
  if(d.type==='chart'){ sCount.textContent=''; renderChart(d); }
  else { cur={di, queue:d.cards.map((_,i)=>i), pos:0, flipped:false}; renderCard(); }
}
function goHome(){ document.getElementById('study').classList.remove('on'); document.getElementById('home').style.display=''; renderHome(); }

function renderChart(d){
  let th='';
  d.tones.forEach(t=>{ const ru=t.col.indexOf('入')===0; th+=`<div class="th ${ru?'ru':''}"><b>${t.col}</b>${t.nm}<br>${t.tp} ${t.val}</div>`; });
  let body='';
  d.rows.forEach(r=>{
    body+=`<div class="rowlab">${r.label}<button onclick="playAudio('${r.rowAudio}')">🔊 整行</button></div>`;
    r.cells.forEach(c=>{ body+=`<div class="cell" onclick="playAudio('${c.hk}')"><div class="c">${c.hk}</div><div class="p">${c.jy}</div></div>`; });
  });
  cardArea.innerHTML=`
    <div class="chartNote">这是第一课的<b>九声调表</b>。点任意字听单字、点「🔊 整行」听整行 9 个调一条龙。<b>si 系</b>和<b>数字</b>行是最准的听辨阶梯；口诀行「番茄酱牛腩面一百碟」帮你记住有 9 个声。</div>
    <div class="rowbtns">
      ${d.rows.map(r=>`<button onclick="playAudio('${r.rowAudio}')">🔊 ${r.label.split(' ')[0]}</button>`).join('')}
    </div>
    <div class="chartScroll"><div class="chartGrid">${th}${body}</div></div>
    <div class="scrollhint">← 表格可左右滑动 →</div>
    <div class="tip" style="margin-top:16px">🎯 第一课目标：能指着任一格读出它的调、并听出 si 系 6 个调的高低。每天点几遍，跟读出声。</div>`;
}

// ---- 翻卡 ----
let cur={di:0, queue:[], pos:0, flipped:false};
function hkClass(s){ const n=[...s].length; return n>=8?'hk xlong':(n>=5?'hk long':'hk') }
function renderCard(){
  const d=DECKS[cur.di];
  if(cur.pos>=cur.queue.length){ return renderDone(); }
  const ci=cur.queue[cur.pos]; const c=d.cards[ci]; const a=c.a||c.hk;
  sCount.textContent=(cur.pos+1)+'/'+cur.queue.length;
  cur.flipped=false;
  cardArea.innerHTML=`
    <div class="flash">
      <div class="${hkClass(c.hk)}">${c.hk}</div>
      <button class="play" onclick="playAudio('${a.replace(/'/g,"\\'")}')">🔊 听</button>
      <div class="reveal" id="rev"><div class="jy">${c.jy||''}</div><div class="cn">${c.cn||''}</div></div>
    </div>
    <div id="ctrl"><button class="showbtn" onclick="flip()">👀 睇答案</button></div>`;
  playAudio(a);
}
function flip(){
  cur.flipped=true;
  document.getElementById('rev').classList.add('on');
  document.getElementById('ctrl').innerHTML=`<div class="acts">
      <button class="again" onclick="mark('again')">🔁 再练</button>
      <button class="know" onclick="mark('know')">✅ 识得</button></div>`;
}
function mark(how){
  const ci=cur.queue[cur.pos];
  if(how==='know'){ state[cardKey(cur.di,ci)]='know'; }
  else { delete state[cardKey(cur.di,ci)]; cur.queue.push(ci); }
  save(); cur.pos++; renderCard();
}
function renderDone(){
  const d=DECKS[cur.di]; const lc=learnedCount(cur.di), tc=d.cards.length;
  cardArea.innerHTML=`<div class="done">
    <div class="big">${lc===tc?'🎉':'👏'}</div>
    <h3>${d.name} — 这轮完成</h3><p class="muted">识得 ${lc}/${tc}</p>
    <div class="acts" style="max-width:360px;margin:18px auto 0">
      <button class="again" onclick="startDeck(${cur.di})">🔁 再来一轮</button>
      <button class="know" onclick="goHome()">🏠 回首页</button></div></div>`;
}
function resetAll(){ if(confirm('清空所有学习进度？')){ state={}; save(); renderHome(); } }

renderHome();
</script>
</body>
</html>
